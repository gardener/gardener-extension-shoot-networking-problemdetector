image:
  repository: europe-docker.pkg.dev/gardener-project/public/gardener/extensions/shoot-networking-problemdetector-admission
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1
resources: {}

metricsPort: 8080
healthPort: 8081

vpa:
  enabled: true
  resourcePolicy:
    minAllowed:
      memory: 32Mi
    controlledValues: RequestsOnly
  updatePolicy:
    updateMode: "Recreate"

webhookConfig:
  serverPort: 10250
  servicePort: 443

# Kubeconfig to the target cluster. In-cluster configuration will be used if not specified.
kubeconfig:
# projectedKubeconfig:
#   baseMountPath: /var/run/secrets/gardener.cloud
#   genericKubeconfigSecretName: generic-token-kubeconfig
#   tokenSecretName: access-shoot-networking-problemdetector-admission

service:
  topologyAwareRouting:
    enabled: false

gardener:
  virtualCluster:
    enabled: true
  runtimeCluster: {}
#   priorityClassName: gardener-garden-system-400
